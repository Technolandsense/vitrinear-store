name: Build APK

on:
  workflow_dispatch:
    inputs:
      store_url:
        description: 'URL de la tienda (ej: https://tienda.vercel.app)'
        required: true
        default: 'https://vitrinear.com'
      store_name:
        description: 'Nombre de la tienda para el APK'
        required: true
        default: 'VitrineAR'
  push:
    branches: [main]
    paths:
      - 'android/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true

      - name: Install Gradle
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Set store URL in config
        run: |
          URL="${{ github.event.inputs.store_url || 'https://vitrinear.com' }}"
          NAME="${{ github.event.inputs.store_name || 'VitrineAR' }}"
          sed -i "s|STORE_URL_PLACEHOLDER|$URL|g" android/app/src/main/res/values/strings.xml
          sed -i "s|STORE_NAME_PLACEHOLDER|$NAME|g" android/app/src/main/res/values/strings.xml
          echo "URL=$URL" >> $GITHUB_ENV
          echo "NAME=$NAME" >> $GITHUB_ENV

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Generate Gradle wrapper
        working-directory: ./android
        run: gradle wrapper --gradle-version=8.5

      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk \
             android/app/build/outputs/apk/release/${{ env.NAME }}.apk 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.NAME }}-apk
          path: android/app/build/outputs/apk/release/${{ env.NAME }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: apk-${{ github.run_number }}
          name: ${{ env.NAME }} v${{ github.run_number }}
          files: android/app/build/outputs/apk/release/${{ env.NAME }}.apk
          generate_release_notes: false
